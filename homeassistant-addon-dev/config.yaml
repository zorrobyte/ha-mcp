name: "Home Assistant MCP Server (Dev)"
description: "Development channel - AI assistant integration via MCP (unstable)"
version: "7.4.1.dev262"
slug: "ha_mcp_dev"
url: "https://github.com/homeassistant-ai/ha-mcp"
stage: experimental
arch:
  - aarch64
  - amd64
init: false
startup: application
boot: manual
ingress: true
ingress_port: 9583
ingress_stream: true
hassio_api: true
hassio_role: default
homeassistant_api: true
host_network: true
image: "ghcr.io/homeassistant-ai/ha-mcp-addon-dev-{arch}"
options:
  backup_hint: "normal"
  enable_skills: true
  enable_skills_as_tools: true
  enable_tool_search: false
  enable_yaml_config_editing: false
  tool_search_max_results: 5
  disabled_tools: ""
  pinned_tools: ""
  verify_ssl: true
schema:
  backup_hint: list(strong|normal|weak|auto)
  secret_path: str?
  enable_skills: bool?
  enable_skills_as_tools: bool?
  enable_tool_search: bool?
  enable_yaml_config_editing: bool?
  enable_filesystem_tools: bool?
  enable_custom_component_integration: bool?
  tool_search_max_results: int(2,10)?
  disabled_tools: str?
  pinned_tools: str?
  verify_ssl: bool?
  advanced_debug_logging: bool?
ports:
  9583/tcp: 9583
